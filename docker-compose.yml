
services:
  postgres-user:
    image: postgres:17
    container_name: postgres-user
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_service_db
    restart: always
    volumes:
      - pgdata-user:/var/lib/postgresql/data
      - ./initdb/user/:/docker-entrypoint-initdb.d
      - ./mock_data:/data
      - ./make-replica/commons/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./make-replica/commons/pg_hba.conf:/etc/postgresql/pg_hba.conf
    ports:
      - "5432:5432"
    networks:
      - dwh-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-user-replica:
    image: postgres:17
    container_name: postgres-user-replica
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_service_repl
    volumes:
      - pgdata-user-r:/var/lib/postgresql/data
      - ./make-replica/commons/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./make-replica/commons/pg_hba.conf:/etc/postgresql/pg_hba.conf
    ports:
      - "5442:5432"
    networks:
      - dwh-network
    depends_on:
      postgres-user:
        condition: service_healthy
      postgres-user-replica-init:
        condition: service_completed_successfully

  postgres-user-replica-init:
    image: postgres:17
    container_name: postgres-user-replica-init
    command: >
      sh -c "pg_basebackup -h postgres-user -U replicator -D /var/lib/postgresql/data -Fp -Xs -P -R -S replica_slot || echo 'Backup failed, will retry'"
    volumes:
      - pgdata-user-r:/var/lib/postgresql/data
    networks:
      - dwh-network
    depends_on:
      postgres-user:
        condition: service_healthy

  postgres-order:
    image: postgres:17
    container_name: postgres-order
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_service_db
    restart: always
    volumes:
      - pgdata-order:/var/lib/postgresql/data
      - ./initdb/order/:/docker-entrypoint-initdb.d
      - ./mock_data:/data
      - ./make-replica/commons/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./make-replica/commons/pg_hba.conf:/etc/postgresql/pg_hba.conf
    ports:
      - "5433:5432"
    networks:
      - dwh-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-order-replica:
    image: postgres:17
    container_name: postgres-order-replica
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_service_repl
    volumes:
      - pgdata-order-r:/var/lib/postgresql/data
      - ./make-replica/commons/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./make-replica/commons/pg_hba.conf:/etc/postgresql/pg_hba.conf
    ports:
      - "5443:5432"
    networks:
      - dwh-network
    depends_on:
      postgres-order:
        condition: service_healthy
      postgres-order-replica-init:
        condition: service_completed_successfully

  postgres-order-replica-init:
    image: postgres:17
    container_name: postgres-order-replica-init
    command: >
      sh -c "pg_basebackup -h postgres-order -U replicator -D /var/lib/postgresql/data -Fp -Xs -P -R -S replica_slot || echo 'Backup failed, will retry'"
    volumes:
      - pgdata-order-r:/var/lib/postgresql/data
    networks:
      - dwh-network
    depends_on:
      postgres-order:
        condition: service_healthy

  postgres-logistics:
    image: postgres:17
    container_name: postgres-logistics
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: logistics_service_db
    restart: always
    volumes:
      - pgdata-logistics:/var/lib/postgresql/data
      - ./initdb/logistics/:/docker-entrypoint-initdb.d
      - ./mock_data:/data
      - ./make-replica/commons/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./make-replica/commons/pg_hba.conf:/etc/postgresql/pg_hba.conf
    ports:
      - "5434:5432"
    networks:
      - dwh-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-logistics-replica:
    image: postgres:17
    container_name: postgres-logistics-replica
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: logistics_service_repl
    volumes:
      - pgdata-logistics-r:/var/lib/postgresql/data
      - ./make-replica/commons/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./make-replica/commons/pg_hba.conf:/etc/postgresql/pg_hba.conf
    ports:
      - "5444:5432"
    networks:
      - dwh-network
    depends_on:
      postgres-logistics:
        condition: service_healthy
      postgres-logistics-replica-init:
        condition: service_completed_successfully

  postgres-logistics-replica-init:
    image: postgres:17
    container_name: postgres-logistics-replica-init
    command: >
      sh -c "pg_basebackup -h postgres-logistics -U replicator -D /var/lib/postgresql/data -Fp -Xs -P -R -S replica_slot || echo 'Backup failed, will retry'"
    volumes:
      - pgdata-logistics-r:/var/lib/postgresql/data
    networks:
      - dwh-network
    depends_on:
      postgres-logistics:
        condition: service_healthy

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.1
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - dwh-network
    healthcheck:
      test: echo srvr | nc zookeeper 2181 || exit 1
      start_period: 10s
      retries: 20
      interval: 10s

  broker:
    image: confluentinc/cp-kafka:7.3.1
    hostname: broker
    container_name: broker
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "29092:29092"
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - dwh-network
    healthcheck:
      test: nc -z localhost 9092 || exit -1
      start_period: 60s
      interval: 10s
      timeout: 10s
      retries: 10

  debezium:
    image: quay.io/debezium/connect:latest
    restart: always
    container_name: debezium
    hostname: debezium
    depends_on:
      broker:
        condition: service_healthy
      postgres-dwh:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: broker:29092
      GROUP_ID: 1

      CONFIG_STORAGE_TOPIC: connect_configs
      STATUS_STORAGE_TOPIC: connect_statuses
      OFFSET_STORAGE_TOPIC: connect_offsets

      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"

      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter

      ENABLE_DEBEZIUM_SCRIPTING: "false"

      CONNECT_PLUGIN_PATH: /kafka/connect,/kafka/connect/custom-plugins
    volumes:
      - ./debezium/connectors/jars:/kafka/connect/custom-plugins
    networks:
      - dwh-network
    healthcheck:
      test:
        [
          "CMD", "curl", "--silent", "--fail",
          "-X", "GET", "http://localhost:8083/connectors",
        ]
      start_period: 300s
      interval: 15s
      timeout: 15s
      retries: 10

  debezium-ui:
    image: debezium/debezium-ui:latest
    restart: always
    container_name: debezium-ui
    hostname: debezium-ui
    depends_on:
      debezium:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CONNECT_URIS: http://debezium:8083
    networks:
      - dwh-network

  debezium-init:
    image: alpine:latest
    restart: on-failure
    container_name: debezium-init
    depends_on:
      debezium:
        condition: service_healthy
    volumes:
      - ./debezium/connectors:/connectors
      - ./debezium/01-init-connectors.sh:/01-init-connectors.sh
      - ./debezium/02-init-dwh-tables.sh:/02-init-dwh-tables.sh
    entrypoint: ["/bin/sh", "-c",
                 "apk add --no-cache curl postgresql-client && chmod +x /01-init-connectors.sh /02-init-dwh-tables.sh && /01-init-connectors.sh && /02-init-dwh-tables.sh"]
    networks:
      - dwh-network

  # DWH layer infra
  postgres-dwh:
    image: postgres:17
    container_name: postgres-dwh
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dwh_db
    restart: always
    volumes:
      - ./initdb/dwh/01_init_dwh.sql:/docker-entrypoint-initdb.d/01_init_dwh.sql
    ports:
      - "5435:5432"
    networks:
      - dwh-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dwh_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  dbt-runner:
    image: ghcr.io/dbt-labs/dbt-postgres:1.9.0
    container_name: dbt-runner
    environment:
      DWH_NAME: dwh_db
      DWH_HOST: postgres-dwh
      DWH_PASSWORD: postgres
      DWH_PORT: 5432
      DWH_SCHEMA: staging
      DWH_USER: postgres
      DBT_PROFILES_DIR: /root/.dbt
    depends_on:
      postgres-dwh:
        condition: service_healthy
      debezium-init:
        condition: service_completed_successfully
    volumes:
      - "./profiles.yml:/root/.dbt/profiles.yml:ro"
      - "./marketplace_dv:/usr/app"
    working_dir: /usr/app
    networks:
      - dwh-network
    entrypoint: ["/bin/sh", "-c", "dbt clean && dbt deps && dbt run"]

  bi-platform:
    image: metabase/metabase:latest
    container_name: bi-platform
    restart: always
    depends_on:
      postgres-dwh:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: dwh_db
      MB_DB_PORT: 5432
      MB_DB_USER: postgres
      MB_DB_PASS: postgres
      MB_DB_HOST: postgres-dwh
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - ./metabase-data:/metabase-data
    networks:
      - dwh-network

  airflow-postgres:
    image: postgres:13
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - dwh-network

  airflow-redis:
    image: redis:latest
    container_name: airflow-redis
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 30s
      retries: 50
    restart: always
    networks:
      - dwh-network

  x-airflow-common:
    &airflow-common
    build:
      context: .
      dockerfile: airflow/Dockerfile
    environment:
      &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://airflow-redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
      AIRFLOW_CONN_DWH_POSTGRES: postgresql://postgres:postgres@postgres-dwh:5432/dwh_db
      AIRFLOW_CONN_USER_SERVICE: postgresql://postgres:postgres@postgres-user:5432/user_service_db
      AIRFLOW_CONN_ORDER_SERVICE: postgresql://postgres:postgres@postgres-order:5432/order_service_db
      AIRFLOW_CONN_LOGISTICS_SERVICE: postgresql://postgres:postgres@postgres-logistics:5432/logistics_service_db
      DWH_NAME: dwh_db
      DWH_HOST: postgres-dwh
      DWH_PASSWORD: postgres
      DWH_PORT: "5432"
      DWH_SCHEMA: presentation
      DWH_USER: postgres
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./marketplace_dv:/opt/airflow/dbt_project
      - ./profiles.yml:/home/airflow/.dbt/profiles.yml:ro
    user: "50000:0"
    depends_on:
      &airflow-common-depends-on
      airflow-redis:
        condition: service_healthy
      airflow-postgres:
        condition: service_healthy
    networks:
      - dwh-network

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        function ver() {
          printf "%04d%04d%04d%04d" $${1//./ }
        }
        airflow_version=$$(AIRFLOW__LOGGING__LOGGING_LEVEL=INFO && gosu airflow airflow version)
        airflow_version_comparable=$$(ver $${airflow_version})
        min_airflow_version=2.2.0
        min_airflow_version_comparable=$$(ver $${min_airflow_version})
        if (( airflow_version_comparable < min_airflow_version_comparable )); then
          echo
          echo -e "\033[1;31mERROR!!!: Too old Airflow version $${airflow_version}!\e[0m"
          echo "The minimum Airflow version supported: $${min_airflow_version}. Only use this or higher!"
          echo
          exit 1
        fi
        one_meg=1048576
        mem_available=$$(($$(getconf _PHYS_PAGES) * $$(getconf PAGE_SIZE) / one_meg))
        cpus_available=$$(grep -cE 'cpu[0-9]+' /proc/stat)
        disk_available=$$(df / | tail -1 | awk '{print $$4}')
        warning_resources="false"
        if (( mem_available < 4000 )) ; then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough memory available for Docker.\e[0m"
          echo "At least 4GB of memory required. You have $$(numfmt --to iec $$((mem_available * one_meg)))"
          echo
          warning_resources="true"
        fi
        if (( cpus_available < 2 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough CPUS available for Docker.\e[0m"
          echo "At least 2 CPUs recommended. You have $${cpus_available}"
          echo
          warning_resources="true"
        fi
        if (( disk_available < one_meg * 10 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough Disk space available for Docker.\e[0m"
          echo "At least 10 GBs recommended. You have $$(numfmt --to iec $$((disk_available * 1024 )))"
          echo
          warning_resources="true"
        fi
        if [[ $${warning_resources} == "true" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: You have not enough resources to run Airflow (see above)!\e[0m"
          echo
        fi
        mkdir -p /sources/airflow/logs /sources/airflow/dags /sources/airflow/plugins
        chown -R "50000:0" /sources/airflow/{logs,dags,plugins}
        mkdir -p /opt/airflow/dbt_project/logs /opt/airflow/dbt_project/target
        chmod -R 777 /opt/airflow/dbt_project/logs
        chmod -R 777 /opt/airflow/dbt_project/target
        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
    user: "0:0"
    volumes:
      - .:/sources

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - 8081:8080
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"']
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    container_name: airflow-worker
    user: "0:0"
    command: celery worker
    healthcheck:
      test: ["CMD-SHELL",
        'celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"']
      interval: 10s
      timeout: 10s
      retries: 5
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    container_name: airflow-triggerer
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-cli:
    <<: *airflow-common
    container_name: airflow-cli
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    command:
      - bash
      - -c
      - airflow

volumes:
  pgdata-user:
  pgdata-user-r:
  pgdata-order:
  pgdata-order-r:
  pgdata-logistics:
  pgdata-logistics-r:
  airflow-pgdata:

networks:
  dwh-network:
    driver: bridge
